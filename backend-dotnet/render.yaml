services:
  - type: web
    name: kynexone-backend
    runtime: docker
    rootDir: backend-dotnet
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080

      - key: PORT
        value: 8080

      - key: Database__RunMigrationsOnStartup
        value: "false"

      - key: ConnectionStrings__Default
        sync: false

      - key: Jwt__Issuer
        value: Zayra.Api

      - key: Jwt__PlatformAudience
        value: KynexOneTenantProd

      - key: Jwt__TenantAudience
        value: KynexOneTenantProd

      - key: Jwt__SigningKey
        sync: false

      - key: SeedAdmin__Email
        sync: false

      - key: SeedAdmin__Password
        sync: false

      - key: CORS_EXTRA_ORIGINS
        sync: false