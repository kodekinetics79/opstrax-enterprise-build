name: opstrax

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8088
        VITE_NODE_EVENTS_URL: http://localhost:8090
    container_name: opstrax-frontend
    restart: unless-stopped
    ports:
      - "10000:80"
    depends_on:
      - api-dotnet
      - node-events

  api-dotnet:
    build:
      context: ./backend-dotnet
      dockerfile: Dockerfile
    container_name: opstrax-dotnet-api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # RLS ENFORCEMENT: connect as the restricted, non-BYPASSRLS app role and turn on
      # per-request tenant scoping. This makes Postgres RLS the active backstop so any
      # read missing a company_id predicate fail-closes to the current tenant instead of
      # leaking cross-tenant. PG_CONNECTION_APP should use the opstrax_app role; falls
      # back to PG_CONNECTION only if unset (dev convenience).
      ConnectionStrings__DefaultConnection: ${PG_CONNECTION_APP:-${PG_CONNECTION}}
      Rls__EnforceTenantContext: "true"
      Cors__AllowedOrigins: http://localhost:10000
      Jwt__Key: ${JWT_KEY}
      Telemetry__DeviceSecret: ${TELEMETRY_DEVICE_SECRET}
      Sse__TicketKey: ${SSE_TICKET_KEY}
      PLATFORM_SUPERADMIN_PASSWORD: ${PLATFORM_SUPERADMIN_PASSWORD}
      PLATFORM_SUPERADMIN_EMAIL: ${PLATFORM_SUPERADMIN_EMAIL:-platform@opstrax.local}
      DemoSeed__Enabled: ${DEMO_SEED_ENABLED:-false}
      DemoSeed__Password: ${DEMO_SEED_PASSWORD:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:-}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:-}
      STORAGE_ENDPOINT: ${STORAGE_ENDPOINT:-}
      STORAGE_REGION: ${STORAGE_REGION:-}
      DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-}
      DATA_ENCRYPTION_KEY_PREVIOUS: ${DATA_ENCRYPTION_KEY_PREVIOUS:-}
      PII_INDEX_KEY: ${PII_INDEX_KEY:-}
    ports:
      - "8088:8080"

  node-events:
    build:
      context: ./services/node-events
      dockerfile: Dockerfile
    container_name: opstrax-node-events
    restart: unless-stopped
    environment:
      PORT: 8090
      API_BASE_URL: http://api-dotnet:8080
      CORS_ORIGIN: http://localhost:10000
    ports:
      - "8090:8090"
