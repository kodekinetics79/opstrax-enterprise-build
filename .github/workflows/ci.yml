name: OpsTrax CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  node-backend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: backend
      - run: npm run build
        working-directory: backend

  node-events-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
        working-directory: node-services/events

  dotnet-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore backend-dotnet/Opstrax.Api.csproj
      - run: dotnet build backend-dotnet/Opstrax.Api.csproj --no-restore
      - run: dotnet restore backend-dotnet.Tests/Opstrax.Tests.csproj
      - run: dotnet build backend-dotnet.Tests/Opstrax.Tests.csproj --no-restore
      # DB-backed suites run in the dedicated SIT environment (isolated Neon branch),
      # not in unit CI — they require a live connection and write tenant data.
      - name: Run unit/source/regression tests
        run: dotnet test backend-dotnet.Tests/Opstrax.Tests.csproj --no-build --filter "FullyQualifiedName!~Postgres&Category!=Integration"
