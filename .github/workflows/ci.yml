name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: build + security regression gate ──────────────────────────────────
  backend-tests:
    name: Backend Tests (security gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore backend-dotnet/Zayra.Api.Tests/Zayra.Api.Tests.csproj

      - name: Build
        run: dotnet build backend-dotnet/Zayra.Api.Tests/Zayra.Api.Tests.csproj --no-restore -c Release

      - name: Run security + regression tests
        run: |
          dotnet test backend-dotnet/Zayra.Api.Tests/Zayra.Api.Tests.csproj \
            --no-build -c Release \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend-dotnet/Zayra.Api.Tests/TestResults/test-results.trx

  # ── Frontend: typecheck ───────────────────────────────────────────────────────
  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        working-directory: frontend
