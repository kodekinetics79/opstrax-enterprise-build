services:
  - type: web
    name: zayra-ai-workforce
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:8080
      - key: PORT
        value: 8080

      # ── REQUIRED SECRETS: set these in the Render dashboard (Environment → Secret Files / Env Vars) ──
      #
      # ConnectionStrings__Default
      #   TiDB Serverless connection string.
      #   Format: Server=<host>;Port=4000;Database=zayra;Uid=<user>;Pwd=<pass>;SslMode=Required;AllowPublicKeyRetrieval=True;
      - key: ConnectionStrings__Default
        sync: false

      # Jwt__SigningKey
      #   ≥64-char random secret. Generate: openssl rand -base64 64
      - key: Jwt__SigningKey
        sync: false

      # Jwt__TenantAudience
      #   Audience claim for tenant (non-platform) JWTs. Must NOT equal "kynexone-tenant" (dev default).
      #   Example: KynexOneTenantProd
      - key: Jwt__TenantAudience
        sync: false

      # Jwt__PlatformAudience
      #   Audience claim for platform-admin JWTs. Must NOT equal "kynexone-platform" (dev default).
      #   Example: KynexOnePlatformProd
      - key: Jwt__PlatformAudience
        sync: false

      # SeedAdmin__Email / SeedAdmin__Password
      #   Credentials for the bootstrap admin account created on first boot.
      - key: SeedAdmin__Email
        sync: false
      - key: SeedAdmin__Password
        sync: false

      # ── NON-SECRET CONFIG ───────────────────────────────────────────────────────────
      - key: Jwt__Issuer
        value: Zayra.Api

      - key: SeedAdmin__TenantName
        value: KynexOne
      - key: SeedAdmin__TenantSlug
        value: zayra

      # Demo data seeder — keep "false" until the schema is confirmed healthy.
      # Set to "true" and redeploy once to seed the IntelliFlow KSA tenant.
      # Seeder is idempotent: safe to leave "true" after the first run.
      - key: SeedAdmin__SeedDemoData
        value: "false"

      # Web service never runs migrations on startup in Production.
      # Migrations are applied via a Render one-off job:
      #   dotnet Zayra.Api.dll --migrate
      # Set to "true" ONLY for local development convenience.
      - key: Database__RunMigrationsOnStartup
        value: "false"

      # CORS — add your real Vercel/frontend URL here (comma-separated for multiple).
      # appsettings.json already whitelists https://kynexone.vercel.app.
      # If your Vercel URL differs, add it here:
      - key: CORS_EXTRA_ORIGINS
        value: ""

      # AI provider — set to "none" to disable AI features entirely.
      - key: AI_PROVIDER
        value: none
